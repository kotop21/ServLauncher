name: Build AstraLauncher

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: uv sync --all-packages --no-dev

      - run: uv pip install pyinstaller

      - run: uv run python .github/scripts/freeze_versions.py

      - name: Get Build Identifier
        shell: bash
        run: |
          VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('packages/desktop/pyproject.toml', 'rb'))['project']['version'])")
          echo "BUILD_ID=${VERSION}" >> $GITHUB_ENV

      - name: Build app
        shell: bash
        run: |
          uv run pyinstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --optimize 2 \
            --name AstraLauncher-${{ runner.os }} \
            --exclude-module PyQt5 \
            --exclude-module PyQt6 \
            --exclude-module PySide6 \
            --exclude-module numpy \
            --exclude-module pandas \
            --exclude-module matplotlib \
            --exclude-module pytest \
            --hidden-import customtkinter \
            --collect-all customtkinter \
            --hidden-import ttkbootstrap_icons \
            --collect-all ttkbootstrap_icons \
            --hidden-import ttkbootstrap_icons_lucide \
            --collect-all ttkbootstrap_icons_lucide \
            --collect-data certifi \
            --paths packages/core/src \
            --paths packages/desktop/src \
            packages/desktop/src/desktop/app.py

      - name: Build Windows Portable
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          uv run pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --optimize 2 `
            --name AstraLauncher-Windows-Portable `
            --exclude-module PyQt5 `
            --exclude-module PyQt6 `
            --exclude-module PySide6 `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module matplotlib `
            --exclude-module pytest `
            --hidden-import customtkinter `
            --collect-all customtkinter `
            --hidden-import ttkbootstrap_icons `
            --collect-all ttkbootstrap_icons `
            --hidden-import ttkbootstrap_icons_lucide `
            --collect-all ttkbootstrap_icons_lucide `
            --collect-data certifi `
            --paths packages/core/src `
            --paths packages/desktop/src `
            packages/desktop/src/desktop/app.py

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg

          create-dmg \
            --volname "Astra Launcher" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AstraLauncher-macOS.app" 175 120 \
            --hide-extension "AstraLauncher-macOS.app" \
            --app-drop-link 425 120 \
            "AstraLauncher-macOS-${{ env.BUILD_ID }}.dmg" \
            "dist/AstraLauncher-macOS.app"

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czvf AstraLauncher-Linux-${{ env.BUILD_ID }}.tar.gz -C dist AstraLauncher-Linux

      - name: Package Windows Installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          @"
          [Setup]
          AppName=Astra Launcher
          AppVersion=${env:BUILD_ID}
          DefaultDirName={autopf}\AstraLauncher
          OutputDir=.
          OutputBaseFilename=AstraLauncher-Windows-Installer-${env:BUILD_ID}
          Compression=lzma
          SolidCompression=yes

          [Files]
          Source: "dist\AstraLauncher-Windows\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\Astra Launcher"; Filename: "{app}\AstraLauncher-Windows.exe"
          Name: "{autodesktop}\Astra Launcher"; Filename: "{app}\AstraLauncher-Windows.exe"
          "@ > setup.iss

          iscc setup.iss

      - name: Upload macOS
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AstraLauncher-macOS-${{ env.BUILD_ID }}
          path: "*.dmg"

      - name: Upload Linux
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AstraLauncher-Linux-${{ env.BUILD_ID }}
          path: "*.tar.gz"

      - name: Upload Windows Portable
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AstraLauncher-Windows-Portable-${{ env.BUILD_ID }}
          path: dist/AstraLauncher-Windows-Portable.exe

      - name: Upload Windows Installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AstraLauncher-Windows-Installer-${{ env.BUILD_ID }}
          path: "*Windows-Installer*.exe"
