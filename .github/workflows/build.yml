name: Build AstraLauncher

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: uv sync

      - run: uv run pip install pyinstaller

      - run: uv run python .github/scripts/freeze_versions.py

      - run: uv run pyinstaller --noconfirm --onefile --windowed --name AstraLauncher-${{ runner.os }} --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module PySide6 --exclude-module numpy --exclude-module pandas --exclude-module matplotlib --exclude-module pytest --hidden-import customtkinter --hidden-import ttkbootstrap_icons --hidden-import ttkbootstrap_icons_lucide --paths packages/core/src --paths packages/desktop/src packages/desktop/src/desktop/app.py

      - uses: actions/upload-artifact@v4
        with:
          name: AstraLauncher-${{ runner.os }}
          path: dist/AstraLauncher-${{ runner.os }}*
